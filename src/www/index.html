<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: \'Segoe UI\', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 30, 60, 0.7);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.2rem;
            color: #4fc3f7;
            text-shadow: 0 0 10px rgba(79, 195, 247, 0.7);
            margin-bottom: 10px;
        }
        .time-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffcc80;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
            animation: pulse 2s infinite;
        }
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 25px;
        }
        .video-container {
            flex: 1;
            min-width: 300px;
            background: rgba(0, 20, 40, 0.8);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .video-container:hover {
            transform: scale(1.02);
        }
        .video-title {
            padding: 15px;
            background: rgba(0, 80, 150, 0.8);
            text-align: center;
            font-size: 1.4rem;
            color: #4fc3f7;
            border-bottom: 2px solid #29b6f6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .video-feed {
            width: 100%;
            height: auto;
            display: block;
            border: none;
            background: #1a237e;
            min-height: 300px;
            transition: opacity 0.3s ease;
        }
        .video-feed.offline {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a237e;
        }
        .offline-message {
            text-align: center;
            padding: 20px;
            max-width: 80%;
        }
        .offline-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            color: #ef5350;
            text-shadow: 0 0 10px rgba(239, 83, 80, 0.5);
        }
        .offline-text {
            font-size: 1.3rem;
            color: #bbdefb;
            font-weight: bold;
        }
        .stats {
            flex: 1;
            min-width: 300px;
            background: rgba(30, 10, 50, 0.8);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #4fc3f7;
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            font-size: 1.1rem;
            color: #90caf9;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px #4fc3f7;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #66bb6a;
            margin-right: 8px;
            animation: blink 1.5s infinite;
        }
        .status-offline {
            background: #ef5350 !important;
            animation: none !important;
        }
        .performance-meter {
            height: 8px;
            background: #424242;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .performance-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 204, 128, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 204, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 204, 128, 0); }
        }
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📹 实时监控中心</h1>
            <div class="time-display" id="real-time">
                加载中...
            </div>
        </header>

        <div class="main-content">
            <div class="video-container">
                <div class="video-title">
                    <span class="status-indicator" id="stream-status"></span>
                    摄像头实时画面 (640x480 @ 30FPS)
                </div>
                <img id="video-stream" class="video-feed" src="" alt="摄像头实时画面">
                <div id="offline-overlay" class="video-feed offline" style="display: none;">
                    <div class="offline-message">
                        <div class="offline-icon">⚠️</div>
                        <div class="offline-text">摄像头离线</div>
                        <div style="color: #90caf9; margin-top: 8px; font-size: 0.9rem;">
                            设备: /dev/video25 • 状态: 未连接
                        </div>
                    </div>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">
                        <span>📡 流状态</span>
                    </div>
                    <div class="stat-value" id="stream-status-text">检测中...</div>
                </div>
                
                <div class="stat-item">
                    <div class="stat-label">
                        <span>⏱️ 延迟</span>
                    </div>
                    <div class="stat-value" id="latency">-- ms</div>
                    <div class="performance-meter">
                        <div class="performance-fill" id="latency-meter"></div>
                    </div>
                </div>
                
                <div class="stat-item">
                    <div class="stat-label">
                        <span>💾 实际帧率</span>
                    </div>
                    <div class="stat-value" id="actual-fps">-- FPS</div>
                    <div class="performance-meter">
                        <div class="performance-fill" id="fps-meter"></div>
                    </div>
                </div>
                
                <div class="stat-item">
                    <div class="stat-label">
                        <span>📊 传输速率</span>
                    </div>
                    <div class="stat-value" id="bandwidth">-- KB/s</div>
                </div>
            </div>
        </div>

        <footer style="text-align: center; margin-top: 30px; padding: 15px; color: #bbdefb; font-size: 0.9rem;">
            <p>Boa Web Server • 摄像头流: MJPEG • 设备: <span id="device-path">/dev/video25</span></p>
            <p>最后更新: <span id="last-update"></span> • 流地址: <span id="stream-url"></span></p>
        </footer>
    </div>

    <script>
        const _qs = new URLSearchParams(window.location.search);
        const DEFAULT_HOST = window.location.hostname;
        const DEFAULT_PORT = '8090';
        const STREAM_HOST = _qs.get('stream_host') || DEFAULT_HOST;
        const STREAM_PORT = _qs.get('stream_port') || DEFAULT_PORT;
        const BASE = `${location.protocol}//${STREAM_HOST}:${STREAM_PORT}`;

        const CONFIG = {
            baseUrl: BASE,
            streamUrl: `${BASE}/?action=stream`,
            snapshotUrl: `${BASE}/?action=snapshot`,
            statusUrl: `${BASE}/?action=status`,
            devicePath: "/dev/video25",
            targetFPS: 30,
            maxLatency: 500 // ms
        };
        
        // ===== DOM 元素 =====
        const videoElement = document.getElementById("video-stream");
        const offlineOverlay = document.getElementById("offline-overlay");
        const statusElement = document.getElementById("stream-status");
        const statusTextElement = document.getElementById("stream-status-text");
        const latencyElement = document.getElementById("latency");
        const fpsElement = document.getElementById("actual-fps");
        const bandwidthElement = document.getElementById("bandwidth");
        const lastUpdateElement = document.getElementById("last-update");
        const devicePathElement = document.getElementById("device-path");
        const streamUrlElement = document.getElementById("stream-url");
        const latencyMeter = document.getElementById("latency-meter");
        const fpsMeter = document.getElementById("fps-meter");
        
        // ===== 状态变量 =====
        let streamActive = false;
        let lastFrameTime = 0;
        let frameCount = 0;
        let lastByteCount = 0;
        let startTime = Date.now();
        let connectionAttempts = 0;
        let framesPerSecond = 0;
        let lastFrameRateUpdate = Date.now();
        
        // ===== 初始化 =====
        devicePathElement.textContent = CONFIG.devicePath;
        streamUrlElement.textContent = CONFIG.streamUrl.split("?")[0];
        
        // ===== 核心功能 =====
        function updateTime() {
            const now = new Date();
            document.getElementById("real-time").textContent = now.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false
            });
            lastUpdateElement.textContent = now.toLocaleTimeString();
        }
        
        function updateStreamStatus(isOnline, latency = 0, fps = 0, bandwidth = 0) {
            const wasActive = streamActive;
            streamActive = isOnline;
            
            // 更新状态指示器
            statusElement.className = "status-indicator" + (isOnline ? "" : " status-offline");
            statusTextElement.textContent = isOnline ? "在线" : "离线";
            statusTextElement.style.color = isOnline ? "#66bb6a" : "#ef5350";
            
            // 显示/隐藏视频流和离线覆盖层
            if (isOnline) {
                if (!wasActive || videoElement.src !== CONFIG.streamUrl) {
                    videoElement.src = CONFIG.streamUrl + "&_=" + Date.now();
                }
                offlineOverlay.style.display = "none";
                videoElement.style.opacity = "1";
            } else {
                videoElement.style.opacity = "0.3";
                offlineOverlay.style.display = "flex";
            }
            
            // 更新性能指标
            if (isOnline) {
                latencyElement.textContent = latency + " ms";
                fpsElement.textContent = fps.toFixed(1) + " FPS";
                bandwidthElement.textContent = bandwidth.toFixed(1) + " KB/s";
                
                // 更新性能条
                const latencyPercent = Math.min(100, (latency / CONFIG.maxLatency) * 100);
                latencyMeter.style.width = (100 - latencyPercent) + "%";
                latencyMeter.style.background = latency > 300 ? "#ef5350" : latency > 150 ? "#ffca28" : "#66bb6a";
                
                const fpsPercent = Math.min(100, (fps / CONFIG.targetFPS) * 100);
                fpsMeter.style.width = fpsPercent + "%";
                fpsMeter.style.background = fps < 10 ? "#ef5350" : fps < 20 ? "#ffca28" : "#66bb6a";
            } else {
                latencyElement.textContent = "-- ms";
                fpsElement.textContent = "-- FPS";
                bandwidthElement.textContent = "-- KB/s";
                latencyMeter.style.width = "0%";
                fpsMeter.style.width = "0%";
            }
        }
        
        // ===== 精确的帧率和延迟计算 =====
        function startFrameMonitoring() {
            // 创建隐藏的图片元素用于性能测试
            const testImage = new Image();
            let lastTestTime = 0;
            let totalLatency = 0;
            let latencySamples = 0;
            
            // 每2秒测量一次延迟
            setInterval(() => {
                if (!streamActive) return;
                
                const testStartTime = Date.now();
                testImage.src = CONFIG.snapshotUrl + "&_=" + Date.now();
                
                testImage.onload = function() {
                    const latency = Date.now() - testStartTime;
                    totalLatency += latency;
                    latencySamples++;
                    
                    if (latencySamples >= 3) {
                        const avgLatency = totalLatency / latencySamples;
                        totalLatency = 0;
                        latencySamples = 0;
                        
                        // 计算带宽（估算）
                        const imageSize = testImage.naturalWidth * testImage.naturalHeight * 0.15; // 粗略估算KB
                        const bandwidth = imageSize / (avgLatency / 1000) / 1024;
                        
                        updateStreamStatus(true, avgLatency, framesPerSecond, bandwidth);
                    }
                };
                
                testImage.onerror = function() {
                    updateStreamStatus(false);
                };
            }, 2000);
            
            // 准确计算帧率
            videoElement.addEventListener('load', function() {
                const now = Date.now();
                if (lastFrameTime) {
                    frameCount++;
                    
                    // 每秒计算一次FPS
                    if (now - lastFrameRateUpdate >= 1000) {
                        framesPerSecond = frameCount;
                        frameCount = 0;
                        lastFrameRateUpdate = now;
                    }
                }
                lastFrameTime = now;
            });
        }
        
        // ===== 健康检查 =====
        function checkStreamHealth() {
            fetch(CONFIG.statusUrl + "&_=" + Date.now(), {
                mode: 'cors',
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    return response.text();
                } else {
                    throw new Error('Status endpoint not available');
                }
            })
            .then(data => {
                // 解析 mjpg-streamer 状态页面
                const lines = data.split('\n');
                let fps = 0;
                let clients = 0;
                
                lines.forEach(line => {
                    if (line.includes('FPS')) {
                        const fpsMatch = line.match(/FPS\s*[:=]\s*(\d+)/i);
                        if (fpsMatch && fpsMatch[1]) fps = parseInt(fpsMatch[1]);
                    }
                    if (line.includes('Clients')) {
                        const clientsMatch = line.match(/Clients\s*[:=]\s*(\d+)/i);
                        if (clientsMatch && clientsMatch[1]) clients = parseInt(clientsMatch[1]);
                    }
                });
                
                if (clients > 0 && fps > 0) {
                    updateStreamStatus(true, 0, fps, 0); // 延迟稍后精确测量
                } else {
                    updateStreamStatus(false);
                }
            })
            .catch(() => {
                // 回退到基本连接测试
                const img = new Image();
                const timeout = 3000;
                const startTime = Date.now();
                
                img.onload = function() {
                    const latency = Date.now() - startTime;
                    updateStreamStatus(true, latency, 15, 100); // 使用估算值
                };
                
                img.onerror = function() {
                    updateStreamStatus(false);
                    connectionAttempts++;
                    
                    // 每3次失败尝试重连
                    if (connectionAttempts % 3 === 0) {
                        console.log('尝试重新连接摄像头...');
                        videoElement.src = '';
                        setTimeout(() => {
                            if (!streamActive) {
                                videoElement.src = CONFIG.streamUrl + "&_=" + Date.now();
                            }
                        }, 1000);
                    }
                };
                
                img.src = CONFIG.snapshotUrl + "&_=" + Date.now();
                
                setTimeout(() => {
                    if (!img.complete) {
                        updateStreamStatus(false);
                    }
                }, timeout);
            });
        }
        
        // ===== 事件监听 =====
        videoElement.addEventListener('error', function() {
            console.log('视频流加载错误');
            updateStreamStatus(false);
        });
        
        videoElement.addEventListener('load', function() {
            console.log('视频流加载成功');
        });
        
        // ===== 初始化执行 =====
        updateTime();
        setInterval(updateTime, 1000);
        
        startFrameMonitoring();
        
        // 首次检查
        checkStreamHealth();
        
        // 每3秒健康检查
        setInterval(checkStreamHealth, 3000);
        
        // 每10秒获取详细状态
        setInterval(() => {
            if (streamActive) {
                fetch(CONFIG.statusUrl + "&_=" + Date.now())
                    .then(response => response.text())
                    .then(data => {
                        console.log('Stream Status:', data);
                    })
                    .catch(err => console.log('Status check error:', err));
            }
        }, 10000);
    </script>
</body>
</html>
